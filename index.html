    // Smoothly animate a number toward its target (ease-out cubic)
    function useCountUp(target,dur=650){
      const [v,setV]=useState(0);
      const prev=useRef(0);
      useEffect(()=>{
        const from=prev.current,to=Number(target)||0;prev.current=to;
        if(from===to){setV(to);return;}
        let raf,start;
        const tick=t=>{if(!start)start=t;const p=Math.min(1,(t-start)/dur);const e=1-Math.pow(1-p,3);setV(Math.round(from+(to-from)*e));if(p<1)raf=requestAnimationFrame(tick);else setV(to);};
        raf=requestAnimationFrame(tick);
        return()=>cancelAnimationFrame(raf);
      },[target]);
      return v;
    }

                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:3,height:18,borderRadius:2,background:c.lavD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Fixed Expenses</span></div>
                    <button onClick={()=>{const id=Date.now();setSe(p=>({...p,fixed:[...p.fixed,{id,name:"New",amount:0}]}));setEF(id);}} style={{border:"none",background:c.lavD,color:c.white,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontFamily:ft,fontSize:12,fontWeight:600}}>+ Add</button>
                  </div>
                  {se.fixed.map(f=>(<div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>{eF===f.id?<><input value={f.name} onChange={e=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,name:e.target.value}:x)}))} style={{...inp,flex:2}}/>{f.variable?<span style={{flex:1,fontSize:11,color:c.sub,textAlign:"center"}}>varies monthly</span>:<NI prefix="¥" value={f.amount} onChange={v=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,amount:v}:x)}))} style={{flex:1}}/>}<button onClick={()=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,variable:!x.variable}:x)}))} style={{border:`2px solid ${f.variable?c.lavD:c.border}`,background:f.variable?c.lavD:"transparent",color:f.variable?c.white:c.sub,borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:mn,whiteSpace:"nowrap"}}>Monthly</button><button onClick={()=>setEF(null)} style={{border:"none",background:c.greenD,color:c.white,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>Done</button></>:<><span style={{flex:2,fontSize:14,fontWeight:500}}>{f.name}{f.variable&&<span style={{fontSize:10,color:c.sub,marginLeft:6}}>monthly</span>}</span><span style={{flex:1,fontSize:13,textAlign:"right",fontWeight:500,color:f.variable?c.sub:c.text}}>{f.variable?"varies":yn(f.amount)}</span><button onClick={()=>setEF(f.id)} style={{border:"none",background:c.cardAlt,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:c.sub,fontWeight:500}}>Edit</button><button onClick={()=>setSe(p=>({...p,fixed:p.fixed.filter(x=>x.id!==f.id)}))} style={{border:"none",background:"transparent",cursor:"pointer",color:c.roseD,fontSize:16,padding:0}}>×</button></>}</div>))}
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><div style={{width:3,height:18,borderRadius:2,background:c.blueD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Notifications</span></div>
                  {'Notification' in window?(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <div><div style={{fontSize:14,fontWeight:500}}>Daily reminders</div><div style={{fontSize:12,color:c.sub,marginTop:2}}>Payday alerts & limit warnings</div></div>
                        <button onClick={async()=>{
                          if(!se.notifs){const p=await Notification.requestPermission();if(p==='granted')setSe(v=>({...v,notifs:true}));}
                          else setSe(v=>({...v,notifs:false}));
                        }} style={{padding:"9px 20px",borderRadius:20,border:"none",cursor:"pointer",background:se.notifs?c.greenD:c.cardAlt,color:se.notifs?c.white:c.sub,fontWeight:700,fontSize:13,fontFamily:ft}}>
                          {se.notifs?"On":"Off"}
                        </button>
                      </div>
                      {se.notifs&&Notification.permission==='granted'&&(
                        <button onClick={()=>new Notification('Finance Tracker ✓',{body:'Notifications are working!',icon:'/finance-tracker/icon-512-v6.png'})} style={{width:"100%",padding:10,border:`1px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,cursor:"pointer",fontFamily:ft,fontSize:12,marginBottom:12}}>
                          Send test notification
                        </button>
                      )}
                      {se.notifs&&Notification.permission!=='granted'&&(
                        <div style={{fontSize:12,color:c.roseD,marginBottom:12}}>Notifications blocked — check your browser or device settings</div>
                      )}
                      <div style={{padding:12,background:c.cardAlt,borderRadius:12,fontSize:12,color:c.sub,lineHeight:1.8}}>
                        <div style={{fontWeight:600,color:c.text,marginBottom:4}}>You'll be notified when:</div>
                        <div>Payday or the day before</div>
                        <div>3 days before payday — top up SUICA</div>
                        <div>Payday — reminder to send Mum her money</div>
                        <div>GBP rate improves when you fetch it</div>
                        <div>Paid leave is coming up (within 5 days)</div>
                        <div>Sunday — if hours aren't logged yet</div>
                        <div>80% of your annual limit reached</div>
                        <div>90% of your annual limit reached</div>
                        <div>Your next shift could exceed the limit</div>
                        <div>Halfway point reached (¥515,000)</div>
                        <div>All fixed expenses paid for the month</div>
                      </div>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:c.muted}}>Not supported in this browser</div>
                  )}
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:3,height:18,borderRadius:2,background:c.accent,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Theme</span></div>
                  <div style={{display:"flex",gap:10}}>
                    {[{id:"latte",label:"Latte",col:"#6f4824",bg:"#d0b88f"},{id:"sage",label:"Sage",col:"#2d6a3e",bg:"#f0f5ee"},{id:"ember",label:"Ember",col:"#b85e2a",bg:"#f5efe8"},{id:"pumpkin",label:"Pumpkin",col:"#fe7f2d",bg:"#233d4d"}].map(t2=>(<button key={t2.id} onClick={()=>setTh(t2.id)} style={{flex:1,padding:"14px 0",borderRadius:14,border:th===t2.id?`3px solid ${t2.col}`:`2px solid ${c.border}`,background:t2.bg,cursor:"pointer",fontFamily:ft,fontSize:12,fontWeight:th===t2.id?700:500,color:t2.col,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{width:24,height:24,borderRadius:12,background:t2.col}}/>{t2.label}</button>))}
                  </div>
                </div>
                <button onPointerDown={()=>{setSv(true);setTimeout(()=>setSv(false),2000);}} style={{width:"100%",padding:16,border:"none",background:sv?c.green:c.greenD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>{sv?"Saved!":"Save Settings"}</button>
                {!confirmReset
                  ?<button onClick={()=>setConfirmReset(true)} style={{width:"100%",padding:16,border:"none",background:c.roseD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>Reset All Data</button>
                  :<div style={{marginTop:8,padding:16,background:c.roseBg,borderRadius:14,border:`2px solid ${c.roseD}`}}><div style={{fontSize:13,color:c.roseD,marginBottom:12,fontWeight:600}}>This will wipe all your data. Are you sure?</div><div style={{display:"flex",gap:8}}><button onClick={hR} style={{flex:1,padding:12,border:"none",background:c.roseD,color:c.white,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:700,cursor:"pointer"}}>Yes, reset</button><button onClick={()=>setConfirmReset(false)} style={{flex:1,padding:12,border:`2px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button></div></div>}
              </div>
            )}

          </div>
          </div>
          <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:30}}>
            <div style={{maxWidth:wide?1100:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:wide?"center":"flex-start",overflowX:"auto",scrollbarWidth:"none",msOverflowStyle:"none",padding:`12px ${px} 18px`,background:c.card,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:`1px solid ${c.border}`}}>
              {tabs.map((t,i)=>(<React.Fragment key={t}>{i>0&&<span style={{width:1,height:14,background:c.border,flexShrink:0,margin:"0 3px",opacity:0.8}}/>}<button onClick={()=>setTab(t)} style={{flexShrink:0,padding:"4px 13px",border:"none",background:"transparent",cursor:"pointer",fontFamily:ft,fontSize:15,fontWeight:tab===t?800:500,color:tab===t?c.accent:c.muted,whiteSpace:"nowrap"}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button></React.Fragment>))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
