                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <div><label style={lbl}>4-Week</label><NI prefix="¥" value={se.food4wk} onChange={v=>setSe(p=>({...p,food4wk:v}))}/></div>
                      <div><label style={lbl}>5-Week</label><NI prefix="¥" value={se.food5wk} onChange={v=>setSe(p=>({...p,food5wk:v}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:c.sub}}>5-week months: Mar, Jun, Aug, Nov</div>
                  </div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:3,height:18,borderRadius:2,background:c.greenD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Exchange Rate</span></div>
                  <label style={lbl}>GBP to JPY</label>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <div style={{flex:1}}><NI prefix="¥" value={se.gbpToJpy} onChange={v=>setSe(p=>({...p,gbpToJpy:v}))}/></div>
                    <button onClick={async()=>{
                      setFxLoad("loading");
                      try{
                        const r=await fetch("https://open.er-api.com/v6/latest/GBP");
                        const j=await r.json();
                        const raw=j&&j.rates&&j.rates.JPY;
                        if(!raw)throw new Error("no rate");
                        const rate=Math.round(raw*10)/10;
                        const oldRate=se.gbpToJpy;
                        setSe(p=>({...p,gbpToJpy:rate}));
                        setFxLoad("done");
                        setTimeout(()=>setFxLoad("idle"),3000);
                        if(se.notifs&&Notification.permission==='granted'&&rate>oldRate) notify('💷 Rate improved!',`£1 = ¥${rate} today (up from ¥${oldRate}) — good time for Dad to send money!`,'rate');
                      }catch(e){
                        setFxLoad("error");
                        setTimeout(()=>setFxLoad("idle"),3000);
                      }
                    }} style={{padding:"10px 16px",borderRadius:12,border:"none",cursor:"pointer",background:fxLoad==="done"?c.greenD:fxLoad==="error"?c.roseD:c.blueD,color:c.white,fontWeight:700,fontSize:13,fontFamily:ft,whiteSpace:"nowrap",opacity:fxLoad==="loading"?0.6:1}}>
                      {fxLoad==="loading"?"…":fxLoad==="done"?"✓":fxLoad==="error"?"✗":"Live rate"}
                    </button>
                  </div>
                  <div style={{fontSize:12,color:c.sub,marginTop:8}}>£1 = ¥{se.gbpToJpy} · tap "Live rate" to fetch today's rate</div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:3,height:18,borderRadius:2,background:c.lavD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Fixed Expenses</span></div>
                    <button onClick={()=>{const id=Date.now();setSe(p=>({...p,fixed:[...p.fixed,{id,name:"New",amount:0}]}));setEF(id);}} style={{border:"none",background:c.lavD,color:c.white,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontFamily:ft,fontSize:12,fontWeight:600}}>+ Add</button>
                  </div>
                  {se.fixed.map(f=>(<div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>{eF===f.id?<><input value={f.name} onChange={e=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,name:e.target.value}:x)}))} style={{...inp,flex:2}}/>{f.variable?<span style={{flex:1,fontSize:11,color:c.sub,textAlign:"center"}}>varies monthly</span>:<NI prefix="¥" value={f.amount} onChange={v=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,amount:v}:x)}))} style={{flex:1}}/>}<button onClick={()=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,variable:!x.variable}:x)}))} style={{border:`2px solid ${f.variable?c.lavD:c.border}`,background:f.variable?c.lavD:"transparent",color:f.variable?c.white:c.sub,borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:mn,whiteSpace:"nowrap"}}>Monthly</button><button onClick={()=>setEF(null)} style={{border:"none",background:c.greenD,color:c.white,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>Done</button></>:<><span style={{flex:2,fontSize:14,fontWeight:500}}>{f.name}{f.variable&&<span style={{fontSize:10,color:c.sub,marginLeft:6}}>monthly</span>}</span><span style={{flex:1,fontSize:13,textAlign:"right",fontWeight:500,color:f.variable?c.sub:c.text}}>{f.variable?"varies":yn(f.amount)}</span><button onClick={()=>setEF(f.id)} style={{border:"none",background:c.cardAlt,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:c.sub,fontWeight:500}}>Edit</button><button onClick={()=>setSe(p=>({...p,fixed:p.fixed.filter(x=>x.id!==f.id)}))} style={{border:"none",background:"transparent",cursor:"pointer",color:c.roseD,fontSize:16,padding:0}}>×</button></>}</div>))}
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><div style={{width:3,height:18,borderRadius:2,background:c.peachD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Subscribe & Save</span></div>
                  <div style={{fontSize:11,color:c.sub,marginBottom:12}}>Your Amazon products & delivery frequency. Tick which arrive each month over in the Budget tab.</div>
                  {(se.subItems||[]).length===0&&<div style={{fontSize:13,color:c.muted,marginBottom:10}}>No items yet — add your products below.</div>}
                  {(se.subItems||[]).map(it=>{const editing=eSub===it.id;return(<div key={it.id} style={{borderBottom:`1px solid ${c.border}`}}>{editing?<div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 0",flexWrap:"wrap"}}><input value={it.name} onChange={e=>uSub(it.id,"name",e.target.value)} placeholder="Item" style={{...inp,flex:2,minWidth:110}}/><div style={{flex:1,position:"relative",minWidth:80}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:c.sub}}>¥</span><input type="number" inputMode="numeric" value={it.price||""} onChange={e=>uSub(it.id,"price",Number(e.target.value)||0)} style={{...inp,paddingLeft:22}}/></div><select value={it.everyN||1} onChange={e=>uSub(it.id,"everyN",Number(e.target.value))} style={{...inp,flex:1,minWidth:96}}>{[1,2,3,4,6].map(n=>(<option key={n} value={n}>{n===1?"monthly":`every ${n}mo`}</option>))}</select><button onClick={()=>uSub(it.id,"payer",(it.payer||"me")==="dad"?"me":"dad")} style={{border:`2px solid ${(it.payer||"me")==="dad"?c.greenD:c.border}`,background:(it.payer||"me")==="dad"?c.greenD:"transparent",color:(it.payer||"me")==="dad"?c.white:c.sub,borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:mn,whiteSpace:"nowrap"}}>{(it.payer||"me")==="dad"?"Dad pays":"I pay"}</button><button onClick={()=>setESub(null)} style={{border:"none",background:c.greenD,color:c.white,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>Done</button><button onClick={()=>{rSub(it.id);setESub(null);}} style={{border:"none",background:"transparent",cursor:"pointer",color:c.roseD,fontSize:16,padding:0}}>×</button></div>:<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",fontSize:13}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:500,color:c.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</div><div style={{fontSize:11,color:c.sub}}>{(it.everyN||1)<=1?"every month":`every ${it.everyN} months`}{(it.payer||"me")==="dad"?" · 👨 Dad pays":""}</div></div><span style={{fontWeight:600,flexShrink:0}}>{yn(it.price||0)}</span><button onClick={()=>setESub(it.id)} style={{border:"none",background:c.cardAlt,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:c.sub,fontWeight:500}}>Edit</button><button onClick={()=>rSub(it.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:c.roseD,fontSize:16,padding:0}}>×</button></div>}</div>);})}
                  <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}><input placeholder="Item name" value={nSub.name} onChange={e=>setNSub(p=>({...p,name:e.target.value}))} style={{...inp,flex:2,minWidth:110}}/><div style={{flex:1,position:"relative",minWidth:70}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:c.sub}}>¥</span><input type="number" inputMode="numeric" placeholder="0" value={nSub.price||""} onChange={e=>setNSub(p=>({...p,price:Number(e.target.value)||0}))} style={{...inp,paddingLeft:22}}/></div><select value={nSub.everyN} onChange={e=>setNSub(p=>({...p,everyN:Number(e.target.value)}))} style={{...inp,flex:1,minWidth:96}}>{[1,2,3,4,6].map(n=>(<option key={n} value={n}>{n===1?"monthly":`every ${n}mo`}</option>))}</select><button onClick={aSub} style={{border:"none",background:c.peachD,color:c.white,borderRadius:12,padding:"10px 16px",cursor:"pointer",fontFamily:ft,fontWeight:700,fontSize:16}}>+</button></div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><div style={{width:3,height:18,borderRadius:2,background:c.blueD,flexShrink:0}}/><span style={{fontSize:15,fontWeight:700}}>Notifications</span></div>
                  {'Notification' in window?(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <div><div style={{fontSize:14,fontWeight:500}}>Daily reminders</div><div style={{fontSize:12,color:c.sub,marginTop:2}}>Payday alerts & limit warnings</div></div>
                        <button onClick={async()=>{
                          if(!se.notifs){const p=await Notification.requestPermission();if(p==='granted'){setSe(v=>({...v,notifs:true}));subscribePush();}}
                          else setSe(v=>({...v,notifs:false}));
                        }} style={{padding:"9px 20px",borderRadius:20,border:"none",cursor:"pointer",background:se.notifs?c.greenD:c.cardAlt,color:se.notifs?c.white:c.sub,fontWeight:700,fontSize:13,fontFamily:ft}}>
                          {se.notifs?"On":"Off"}
                        </button>
                      </div>
                      {se.notifs&&Notification.permission==='granted'&&(
                        <button onClick={()=>notify('Finance Tracker ✓','Notifications are working!','test')} style={{width:"100%",padding:10,border:`1px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,cursor:"pointer",fontFamily:ft,fontSize:12,marginBottom:12}}>
                          Send test notification
                        </button>
                      )}
                      {se.notifs&&Notification.permission!=='granted'&&(
                        <div style={{fontSize:12,color:c.roseD,marginBottom:12}}>Notifications blocked — check your browser or device settings</div>
                      )}
                      <div style={{padding:12,background:c.cardAlt,borderRadius:12,fontSize:12,color:c.sub,lineHeight:1.8}}>
                        <div style={{fontWeight:600,color:c.text,marginBottom:4}}>You'll be notified when:</div>
                        <div>Payday or the day before</div>
                        <div>3 days before payday — top up SUICA</div>
                        <div>Payday — reminder to send Mum her money</div>
                        <div>GBP rate improves when you fetch it</div>
                        <div>Paid leave is coming up (within 5 days)</div>
                        <div>Sunday — if hours aren't logged yet</div>
                        <div>80% of your annual limit reached</div>
                        <div>90% of your annual limit reached</div>
                        <div>Your next shift could exceed the limit</div>
                        <div>Halfway point reached ({yn(se.annualLimit/2)})</div>
                        <div>All fixed expenses paid for the month</div>
                        <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${c.border}`,color:c.muted}}>Pop-up alerts appear while the app is open. Whatever's due also shows in the <b>Coming up</b> panel on the home screen every time you open it. (Alerts while the app is fully closed need background push — ask to set this up.)</div>
                      </div>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:c.muted}}>Not supported in this browser</div>
                  )}
                </div>
                <button onPointerDown={()=>{setSv(true);setTimeout(()=>setSv(false),2000);}} style={{width:"100%",padding:16,border:"none",background:sv?c.green:c.greenD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>{sv?"Saved!":"Save Settings"}</button>
                {!confirmReset
                  ?<button onClick={()=>setConfirmReset(true)} style={{width:"100%",padding:16,border:"none",background:c.roseD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>Reset All Data</button>
                  :<div style={{marginTop:8,padding:16,background:c.roseBg,borderRadius:14,border:`2px solid ${c.roseD}`}}><div style={{fontSize:13,color:c.roseD,marginBottom:12,fontWeight:600}}>This will wipe all your data. Are you sure?</div><div style={{display:"flex",gap:8}}><button onClick={hR} style={{flex:1,padding:12,border:"none",background:c.roseD,color:c.white,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:700,cursor:"pointer"}}>Yes, reset</button><button onClick={()=>setConfirmReset(false)} style={{flex:1,padding:12,border:`2px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button></div></div>}
              </div>
            )}

          </div>
          </div>
          <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:30}}>
            <div style={{maxWidth:wide?1100:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:wide?"center":"flex-start",overflowX:"auto",scrollbarWidth:"none",msOverflowStyle:"none",padding:`12px ${px} calc(env(safe-area-inset-bottom) + 28px)`,background:c.card,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:`1px solid ${c.border}`}}>
              {tabs.map((t,i)=>(<React.Fragment key={t}>{i>0&&<span style={{width:1,height:14,background:c.border,flexShrink:0,margin:"0 3px",opacity:0.8}}/>}<button onClick={()=>setTab(t)} style={{flexShrink:0,padding:"4px 13px",border:"none",background:"transparent",cursor:"pointer",fontFamily:ft,fontSize:15,fontWeight:tab===t?800:500,color:tab===t?c.accent:c.muted,whiteSpace:"nowrap"}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button></React.Fragment>))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
