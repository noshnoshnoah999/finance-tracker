                  <NI prefix="¥" value={se.savingsGoal||0} onChange={v=>setSe(p=>({...p,savingsGoal:v}))} placeholder="e.g. 500000"/>
                  {se.savingsGoal>0&&(
                    <div style={{marginTop:12,padding:14,background:c.cardAlt,borderRadius:14,fontSize:13}}>
                      {tS>=se.savingsGoal?(
                        <div style={{color:c.greenD,fontWeight:700,fontSize:14,textAlign:"center"}}>🎉 Goal reached!</div>
                      ):(
                        <div>
                          <div style={rw}><span style={{color:c.sub}}>Still needed</span><span style={{fontWeight:700,color:c.blueD}}>{yn(se.savingsGoal-tS)}</span></div>
                          {sA>0&&<div style={rw}><span style={{color:c.sub}}>At current rate</span><span style={{fontWeight:600}}>{Math.ceil((se.savingsGoal-tS)/sA)} more months</span></div>}
                        </div>
                      )}
                    </div>
                  )}
                </div>

              </div>
            )}

            {tab==="settings"&&(
              <div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:10,height:10,borderRadius:5,background:c.greenD}}/><span style={{fontSize:15,fontWeight:700}}>Wage & Limits</span></div>
                  <div style={{display:"grid",gap:12}}>
                    <div><label style={lbl}>Hourly Wage</label><NI prefix="¥" value={se.hourlyWage} onChange={v=>setSe(p=>({...p,hourlyWage:v}))}/></div>
                    <div><label style={lbl}>Annual Limit</label><NI prefix="¥" value={se.annualLimit} onChange={v=>setSe(p=>({...p,annualLimit:v}))}/></div>
                  </div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:10,height:10,borderRadius:5,background:c.blueD}}/><span style={{fontSize:15,fontWeight:700}}>Transport</span></div>
                  <div style={{display:"grid",gap:12}}>
                    <div><label style={lbl}>Commute One-Way</label><NI prefix="¥" value={se.commuteOneWay} onChange={v=>setSe(p=>({...p,commuteOneWay:v}))}/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <div><label style={lbl}>Before 14 Mar</label><NI prefix="¥" value={se.trBefore} onChange={v=>setSe(p=>({...p,trBefore:v}))}/></div>
                      <div><label style={lbl}>After 14 Mar</label><NI prefix="¥" value={se.trAfter} onChange={v=>setSe(p=>({...p,trAfter:v}))}/></div>
                    </div>
                    <div style={{fontSize:12,color:c.sub}}>Round trip: {yn(rt)}</div>
                  </div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:10,height:10,borderRadius:5,background:c.peachD}}/><span style={{fontSize:15,fontWeight:700}}>Food Budget</span></div>
                  <div style={{display:"grid",gap:12}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                      <div><label style={lbl}>4-Week</label><NI prefix="¥" value={se.food4wk} onChange={v=>setSe(p=>({...p,food4wk:v}))}/></div>
                      <div><label style={lbl}>5-Week</label><NI prefix="¥" value={se.food5wk} onChange={v=>setSe(p=>({...p,food5wk:v}))}/></div>
                    </div>
                    <div style={{fontSize:11,color:c.sub}}>5-week months: Mar, Jun, Aug, Nov</div>
                  </div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:10,height:10,borderRadius:5,background:c.greenD}}/><span style={{fontSize:15,fontWeight:700}}>Exchange Rate</span></div>
                  <label style={lbl}>GBP to JPY</label>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <div style={{flex:1}}><NI prefix="¥" value={se.gbpToJpy} onChange={v=>setSe(p=>({...p,gbpToJpy:v}))}/></div>
                    <button onClick={async()=>{
                      setFxLoad("loading");
                      try{
                        const r=await fetch("https://api.frankfurter.app/latest?from=GBP&to=JPY");
                        const j=await r.json();
                        const rate=Math.round(j.rates.JPY);
                        setSe(p=>({...p,gbpToJpy:rate}));
                        setFxLoad("done");
                        setTimeout(()=>setFxLoad("idle"),3000);
                      }catch(e){
                        setFxLoad("error");
                        setTimeout(()=>setFxLoad("idle"),3000);
                      }
                    }} style={{padding:"10px 16px",borderRadius:12,border:"none",cursor:"pointer",background:fxLoad==="done"?c.greenD:fxLoad==="error"?c.roseD:c.blueD,color:c.white,fontWeight:700,fontSize:13,fontFamily:ft,whiteSpace:"nowrap",opacity:fxLoad==="loading"?0.6:1}}>
                      {fxLoad==="loading"?"…":fxLoad==="done"?"✓":fxLoad==="error"?"✗":"Live rate"}
                    </button>
                  </div>
                  <div style={{fontSize:12,color:c.sub,marginTop:8}}>£1 = ¥{se.gbpToJpy} · tap "Live rate" to fetch today's rate</div>
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:10,height:10,borderRadius:5,background:c.lavD}}/><span style={{fontSize:15,fontWeight:700}}>Fixed Expenses</span></div>
                    <button onClick={()=>{const id=Date.now();setSe(p=>({...p,fixed:[...p.fixed,{id,name:"New",amount:0}]}));setEF(id);}} style={{border:"none",background:c.lavD,color:c.white,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontFamily:ft,fontSize:12,fontWeight:600}}>+ Add</button>
                  </div>
                  {se.fixed.map(f=>(<div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>{eF===f.id?<><input value={f.name} onChange={e=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,name:e.target.value}:x)}))} style={{...inp,flex:2}}/><NI prefix="¥" value={f.amount} onChange={v=>setSe(p=>({...p,fixed:p.fixed.map(x=>x.id===f.id?{...x,amount:v}:x)}))} style={{flex:1}}/><button onClick={()=>setEF(null)} style={{border:"none",background:c.greenD,color:c.white,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>Done</button></>:<><span style={{flex:2,fontSize:14,fontWeight:500}}>{f.name}</span><span style={{flex:1,fontSize:13,textAlign:"right",fontWeight:500}}>{yn(f.amount)}</span><button onClick={()=>setEF(f.id)} style={{border:"none",background:c.cardAlt,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:c.sub,fontWeight:500}}>Edit</button><button onClick={()=>setSe(p=>({...p,fixed:p.fixed.filter(x=>x.id!==f.id)}))} style={{border:"none",background:"transparent",cursor:"pointer",color:c.roseD,fontSize:16,padding:0}}>×</button></>}</div>))}
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><div style={{width:10,height:10,borderRadius:5,background:c.blueD}}/><span style={{fontSize:15,fontWeight:700}}>Notifications</span></div>
                  {'Notification' in window?(
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <div><div style={{fontSize:14,fontWeight:500}}>Daily reminders</div><div style={{fontSize:12,color:c.sub,marginTop:2}}>Payday alerts & limit warnings</div></div>
                        <button onClick={async()=>{
                          if(!se.notifs){const p=await Notification.requestPermission();if(p==='granted')setSe(v=>({...v,notifs:true}));}
                          else setSe(v=>({...v,notifs:false}));
                        }} style={{padding:"9px 20px",borderRadius:20,border:"none",cursor:"pointer",background:se.notifs?c.greenD:c.cardAlt,color:se.notifs?c.white:c.sub,fontWeight:700,fontSize:13,fontFamily:ft}}>
                          {se.notifs?"On":"Off"}
                        </button>
                      </div>
                      {se.notifs&&Notification.permission==='granted'&&(
                        <button onClick={()=>new Notification('Finance Tracker ✓',{body:'Notifications are working!',icon:'/icon-512.png'})} style={{width:"100%",padding:10,border:`1px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,cursor:"pointer",fontFamily:ft,fontSize:12,marginBottom:12}}>
                          Send test notification
                        </button>
                      )}
                      {se.notifs&&Notification.permission!=='granted'&&(
                        <div style={{fontSize:12,color:c.roseD,marginBottom:12}}>Notifications blocked — check your browser or device settings</div>
                      )}
                      <div style={{padding:12,background:c.cardAlt,borderRadius:12,fontSize:12,color:c.sub,lineHeight:1.7}}>
                        <div style={{fontWeight:600,color:c.text,marginBottom:4}}>You'll be notified when:</div>
                        <div>• It's your payday or the day before</div>
                        <div>• You've hit 80% of your annual limit</div>
                        <div>• You've hit 90% of your annual limit</div>
                      </div>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:c.muted}}>Not supported in this browser</div>
                  )}
                </div>
                <div style={crd}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:10,height:10,borderRadius:5,background:c.accent}}/><span style={{fontSize:15,fontWeight:700}}>Theme</span></div>
                  <div style={{display:"flex",gap:10}}>
                    {[{id:"sage",label:"Sage",col:"#2d6a3e",bg:"#f0f5ee"},{id:"ember",label:"Ember",col:"#b85e2a",bg:"#f5efe8"},{id:"pumpkin",label:"Pumpkin",col:"#fe7f2d",bg:"#233d4d"}].map(t2=>(<button key={t2.id} onClick={()=>setTh(t2.id)} style={{flex:1,padding:"14px 0",borderRadius:14,border:th===t2.id?`3px solid ${t2.col}`:`2px solid ${c.border}`,background:t2.bg,cursor:"pointer",fontFamily:ft,fontSize:12,fontWeight:th===t2.id?700:500,color:t2.col,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{width:24,height:24,borderRadius:12,background:t2.col}}/>{t2.label}</button>))}
                  </div>
                </div>
                <button onPointerDown={()=>{setSv(true);setTimeout(()=>setSv(false),2000);}} style={{width:"100%",padding:16,border:"none",background:sv?c.green:c.greenD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>{sv?"Saved!":"Save Settings"}</button>
                {!confirmReset
                  ?<button onClick={()=>setConfirmReset(true)} style={{width:"100%",padding:16,border:"none",background:c.roseD,color:c.white,borderRadius:14,fontFamily:ft,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>Reset All Data</button>
                  :<div style={{marginTop:8,padding:16,background:c.roseBg,borderRadius:14,border:`2px solid ${c.roseD}`}}><div style={{fontSize:13,color:c.roseD,marginBottom:12,fontWeight:600}}>This will wipe all your data. Are you sure?</div><div style={{display:"flex",gap:8}}><button onClick={hR} style={{flex:1,padding:12,border:"none",background:c.roseD,color:c.white,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:700,cursor:"pointer"}}>Yes, reset</button><button onClick={()=>setConfirmReset(false)} style={{flex:1,padding:12,border:`2px solid ${c.border}`,background:"transparent",color:c.sub,borderRadius:10,fontFamily:ft,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button></div></div>}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
